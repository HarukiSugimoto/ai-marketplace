# レイアウトカタログ — /catalog-add で育てる
#
# deck.json が唯一の真実。スライド生成では各スライドをここの deck 例に従った
# オブジェクトで表現する。それを2つのレンダラーが消費する:
#   render-marp.js → Marp/HTML(高速プレビュー)   render-pptx.js → 編集可能pptx(図形保持)
# 新レイアウトを足すときは、この deck スキーマ・lab.css のクラス・render-pptx.js の
# 図形レシピ・render-marp.js の分岐の4点をそろえる(/catalog-add が案内する)。
#
# 各エントリ:
#   id / category / when(いつ使うか。生成時の選定基準)
#   deck: そのレイアウトが deck.json で取るフィールド(例)

layouts:
  - id: title
    category: structure
    when: 表紙。発表タイトル・発表者・日付・発表の場。
    deck: '{ "layout": "title", "title": "発表タイトル", "meta": "氏名 ・ 日付 ・ 発表の場" }'

  - id: toc
    category: structure
    when: 目次。表紙直後(学会・修論は必須、進捗報告は省略可)。current で現在章を強調。
    deck: '{ "layout": "toc", "title": "目次", "items": ["背景", "提案手法", "実験", "まとめ"], "current": 1 }'

  - id: section
    category: structure
    when: 章の切り替わり。10枚超のときのみ。以降のスライドは header に同じ章名を入れて上部固定表示。
    deck: '{ "layout": "section", "title": "提案手法" }'

  - id: plain
    category: explain
    when: 既定。見出し(主張文)+ 箇条書き(最大5)。迷ったらこれ。1枚1メッセージ。
    deck: '{ "layout": "plain", "header": "章名", "headline": "このスライドの主張を文で", "bullets": ["根拠1", "根拠2"] }'

  - id: two-col
    category: explain
    when: 図と説明を並べる。left に図・right に説明。図が主役なら wide:true で左を広く。left/right のセルは image / bullets のほか table(columns/rows/highlight/widths)も置ける(片側に表・片側に解釈を並べるとき)。
    deck: '{ "layout": "two-col", "header": "章名", "headline": "見出し", "wide": true, "left": { "table": { "columns": ["条件", "acc"], "rows": [["A", "0.83"], ["B", "0.85"]], "highlight": [1] } }, "right": { "bullets": ["Bが最良", "差は有意"] } }'

  - id: compare
    category: compare
    when: ベースライン vs 提案、Before/After。baseline=従来(グレー)、proposed=提案(深紅)。
    deck: '{ "layout": "compare", "header": "章名", "headline": "見出し", "baseline": { "title": "従来手法", "bullets": ["特徴・数値"] }, "proposed": { "title": "提案手法", "bullets": ["改善数値"] } }'

  - id: figure-full
    category: result
    when: 結果グラフ・アーキ全体図など図そのものを見せる。文字は最小限。見出しは主張文。
    deck: '{ "layout": "figure-full", "header": "章名", "headline": "提案手法が全条件で上回る", "image": "figures/result.png", "caption": "図1: …(n=5, 平均±標準偏差)" }'

  - id: metrics
    category: result
    when: 重要な数値を2〜4個だけ大書きして印象付ける。詳細な表は別スライドへ。
    deck: '{ "layout": "metrics", "header": "章名", "headline": "結果サマリ", "metrics": [{ "value": "-64%", "label": "推論レイテンシ" }, { "value": "+0.8", "label": "BLEU" }] }'

  - id: table
    category: result
    when: 数値結果を行列の表で見せる(実験のacc/loss一覧・アブレーション等)。図が無く表が主役のとき。列は3〜6・行は最大10目安、超えるなら分割。highlight で重要行を強調(深紅)。行数が多く詰めたいときは compact:true(HTML で字・余白を縮小。pptx は行数で自動縮小)。
    deck: '{ "layout": "table", "header": "章名", "headline": "主張見出し", "columns": ["除去列", "残", "mean", "base比", "判定"], "rows": [["noEar9Var", "8", "83.27", "-4.63", "最重要"], ["noPup", "9", "85.10", "-2.80", "重要"]], "highlight": [0, 1], "widths": [3, 1, 1.4, 1.4, 1.6], "compact": false, "note": "補足1行(任意)" }'

  - id: panels
    category: result
    when: 複数の異種ブロック(表・画像・箇条書き)を小見出し付きで1枚に並べる。左右で「表と図」「表と要約」など性質の違う情報を対比・併置したいとき。columns は列(横分割)、各列は panel の配列(縦積み)。各 panel は title + table|image|bullets。widths で列幅比。
    deck: '{ "layout": "panels", "header": "章名", "headline": "主張見出し", "widths": [1, 1], "columns": [ [ { "title": "定量", "table": { "columns": ["条件", "acc"], "rows": [["A", "0.83"], ["B", "0.85"]], "highlight": [1] } } ], [ { "title": "定性", "bullets": ["Bは誤検出が少ない", "推論も高速"] }, { "title": "代表例", "image": "figures/case.png" } ] ], "note": "補足1行(任意)" }'

  - id: grid
    category: result
    when: 小さい画像を格子配置(データセット例・エッジ設計カタログ・条件別の出力サンプル等)。cols で列数、items は image + 任意 caption の配列。行数は自動。
    deck: '{ "layout": "grid", "header": "章名", "headline": "主張見出し", "cols": 4, "items": [ { "image": "figures/a.png", "caption": "条件A" }, { "image": "figures/b.png", "caption": "条件B" } ], "note": "補足1行(任意)" }'

  - id: discussion
    category: lab
    when: 進捗報告の「議論したい点・詰まっている点」。質問を明確な問いの形で書く。
    deck: '{ "layout": "discussion", "header": "章名", "title": "議論したいこと", "items": ["○○の指標は妥当か?", "□□を先に検証すべきか?"] }'

  - id: takeaway
    category: structure
    when: まとめスライド。要点の箇条書き + 持ち帰ってほしい1文を message に。
    deck: '{ "layout": "takeaway", "header": "章名", "headline": "まとめ", "bullets": ["要点1", "要点2"], "message": "提案手法は精度を保ったまま推論を64%高速化する" }'

  - id: flow
    category: diagram
    when: フロー図・アーキ図・パイプライン・状態遷移・決定木など「ノード＋矢印」の図。pptx で本物の図形(編集可能)として描く。ノード配置は正規化座標(0〜1・見出し下の領域基準)で指定。写真・数式が主役なら figure-full(画像)を使う。
    deck: '{ "layout": "flow", "header": "章名", "headline": "主張見出し(文で)", "groups": [{ "x": 0.13, "y": 0.02, "w": 0.22, "h": 0.96, "label": "凍結ブランチ", "variant": "frozen" }], "nodes": [{ "id": "in", "x": 0.0, "y": 0.4, "w": 0.1, "h": 0.2, "shape": "ellipse", "variant": "neutral", "title": "入力" }, { "id": "enc", "x": 0.15, "y": 0.4, "w": 0.18, "h": 0.2, "shape": "roundRect", "variant": "frozen", "title": "Encoder", "lines": ["ST-GCN", "→ (B,128)"] }, { "id": "head", "x": 0.42, "y": 0.4, "w": 0.18, "h": 0.2, "shape": "roundRect", "variant": "accent", "title": "Head (trained)" }, { "id": "out", "x": 0.7, "y": 0.4, "w": 0.16, "h": 0.2, "shape": "roundRect", "variant": "accent", "title": "出力 0/1" }], "edges": [{ "from": "in", "to": "enc", "arrow": "end", "style": "solid" }, { "from": "enc", "to": "head", "label": "embed" }, { "from": "head", "to": "out", "fromSide": "right", "toSide": "left" }], "labels": [{ "x": 0.0, "y": 0.9, "w": 1.0, "h": 0.08, "text": "凡例テキスト", "variant": "muted", "align": "left" }], "note": "補足1行(任意)" }'
    # ノード variant: neutral(白/line枠) / frozen(panel塗り/muted枠) / accent(accentSoft塗り/accent枠)。すべて tokens.json 由来。
    # ノード shape: rect / roundRect(既定) / ellipse(端子) / diamond(判断)。
    # edge: arrow(end 既定 / both / begin / none)、style(solid / dashed / dotted)、label(線中点)、
    #       fromSide/toSide(auto 既定 | top | bottom | left | right)、waypoints([{x,y}…]で直交ルート明示)。
    # groups: ノード群を囲む背景枠(x/y/w/h/label/variant)。labels: 枠なし自由テキスト(注記・式・凡例)。

# 数式・複雑な図の扱い:
#   数式や写真・込み入った図は画像として貼る(figure-full / two-col の image に PNG)。この画像部分は pptx では編集不可。
#   一方でフロー図・アーキ図など「ノード＋矢印」の図は flow レイアウトで本物の図形として描けば pptx でも編集可能。
