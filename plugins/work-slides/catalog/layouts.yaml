# work-slides レイアウトカタログ(ビジネス向け・結論ファースト)
#
# 新レイアウトを足すときは4点をそろえること(/catalog-add が案内):
#   1. このファイルに id / category / when / deck(JSON例)を追加
#   2. theme/work.css に CSS クラスを追加(色は var(--c-*) のみ使用)
#   3. scripts/render-pptx.js の RECIPES に図形レシピを追加
#   4. scripts/render-marp.js の switch に case を追加
# id は4ファイルすべてで一致させる。
#
# deck: は deck.json の slides[] に置く1スライド分の JSON 例。
# when: は生成時のレイアウト選定の唯一の手がかり。具体的に書く。

layouts:
  - id: title
    category: 構成
    when: 表紙。宛先(to)・タイトル・部署/氏名/日付(meta)。会社パックにロゴがあれば自動配置
    deck: |
      { "layout": "title", "to": "○○株式会社 御中",
        "title": "業務効率化ツール導入のご提案",
        "subtitle": "初期費用ゼロで始める帳票自動化",
        "meta": "2027-04-15 | 開発部 杉本晴基" }

  - id: agenda
    category: 構成
    when: 目次・本日の内容。current で現在位置を強調(章の切り替わりで再掲も可)
    deck: |
      { "layout": "agenda", "title": "本日の内容",
        "items": ["現状の課題", "ご提案内容", "導入効果", "スケジュールと費用"], "current": 1 }

  - id: section
    category: 構成
    when: 章扉(ネイビー全面)。no に "01" 等の章番号
    deck: |
      { "layout": "section", "title": "ご提案内容", "no": "02" }

  - id: exec-summary
    category: 結論
    when: 冒頭の要旨。ask に「決めてほしいこと・お願い」を1文で、points に根拠を最大3点。提案書・報告書の2枚目に置くのが基本形
    deck: |
      { "layout": "exec-summary", "headline": "本日お願いしたいこと",
        "ask": "帳票自動化ツールの試験導入(3ヶ月・50万円)をご承認いただきたい",
        "points": [
          { "label": "効果", "text": "月80時間の手作業を自動化(投資回収は4ヶ月)" },
          { "label": "リスク", "text": "試験導入のため解約自由・既存業務への影響なし" },
          { "label": "体制", "text": "開発部2名で導入可能。追加採用は不要" } ] }

  - id: body
    category: 説明
    when: 既定レイアウト。主張文の見出し + 箇条書き(最大5項目)。迷ったらこれ
    deck: |
      { "layout": "body", "header": "ご提案内容", "headline": "導入は3ステップで完了する",
        "bullets": ["現行帳票のフォーマット登録(1週間)", "並行運用で精度検証(1ヶ月)", "本番切替(段階的に移行)"] }

  - id: two-col
    category: 説明
    when: 図・スクリーンショットと説明を並べる。図が主役なら wide で左を広く
    deck: |
      { "layout": "two-col", "header": "ご提案内容", "headline": "ダッシュボードで処理状況を一目で把握",
        "wide": true,
        "left": { "image": "figures/dashboard.png" },
        "right": { "bullets": ["処理件数・エラーを常時表示", "異常時はメール通知"] } }

  - id: problem-solution
    category: 説得
    when: 課題と解決策を対で見せる(左=課題カード・赤系、右=解決カード・紺、間に矢印)。提案の中核
    deck: |
      { "layout": "problem-solution", "header": "現状の課題", "headline": "手作業の帳票処理がボトルネックになっている",
        "problem": { "title": "課題", "bullets": ["月80時間の手入力", "転記ミスが月10件", "属人化(担当1名)"] },
        "solution": { "title": "解決策", "bullets": ["OCR+自動転記で入力ゼロ", "検証ルールでミス防止", "手順の標準化"] } }

  - id: compare
    category: 説得
    when: 複数案の比較(2〜4案)。recommended:true の案に「推奨」バッジ。松竹梅・相見積もりに
    deck: |
      { "layout": "compare", "header": "ご提案内容", "headline": "スモールスタートのB案を推奨する",
        "options": [
          { "title": "A案: 全面導入", "bullets": ["初年度 600万円", "効果最大", "移行リスク大"] },
          { "title": "B案: 試験導入", "bullets": ["3ヶ月 50万円", "リスク最小", "効果検証後に拡大"], "recommended": true },
          { "title": "C案: 現状維持", "bullets": ["追加費用なし", "課題は未解決のまま"] } ] }

  - id: table
    category: 事実
    when: 費用表・機能一覧・条件比較などの表。pptx でも PowerPoint ネイティブの表になり編集可能
    deck: |
      { "layout": "table", "header": "スケジュールと費用", "headline": "試験導入の費用は総額50万円",
        "columns": ["項目", "内容", "費用"],
        "rows": [["ライセンス", "10ユーザー×3ヶ月", "30万円"],
                 ["初期設定", "帳票フォーマット登録", "15万円"],
                 ["トレーニング", "操作研修 2回", "5万円"]],
        "note": "※ 金額は税抜。本番移行時は別途お見積り" }

  - id: roadmap
    category: 事実
    when: スケジュール・導入計画の横タイムライン(2〜5フェーズ)。各フェーズに期間とやること
    deck: |
      { "layout": "roadmap", "header": "スケジュールと費用", "headline": "3ヶ月で効果検証まで完了する",
        "phases": [
          { "label": "準備", "period": "4月", "items": ["契約・環境構築", "フォーマット登録"] },
          { "label": "並行運用", "period": "5月", "items": ["手作業と並行処理", "精度測定"] },
          { "label": "評価", "period": "6月", "items": ["効果レポート", "本格導入の判断"] } ] }

  - id: kpi
    category: 事実
    when: 数値インパクトの大書き(2〜4枚のカード)。効果・実績の訴求に
    deck: |
      { "layout": "kpi", "header": "導入効果", "headline": "3ヶ月で投資を回収できる",
        "metrics": [
          { "value": "-80h", "label": "月間作業時間" },
          { "value": "-95%", "label": "転記ミス" },
          { "value": "4ヶ月", "label": "投資回収期間" } ] }

  - id: next-action
    category: 結論
    when: 締めのスライド。誰が・何を・いつまでの表 + 相手への依頼メッセージ。報告書・定例の最後にも
    deck: |
      { "layout": "next-action", "header": "まとめ", "headline": "次のアクション",
        "actions": [
          { "who": "貴社", "what": "試験導入のご承認", "when": "4/末" },
          { "who": "弊社", "what": "契約書・導入計画書の送付", "when": "承認後3営業日" },
          { "who": "両社", "what": "キックオフミーティング", "when": "5月第1週" } ],
        "message": "まずは3ヶ月の試験導入から、リスクなく始められます" }

# 補足:
# - 数式・複雑な図・チャートは図形化できないので画像(PNG)として貼る(pptx では編集不可)
# - グラフは Excel 由来なら元データごと相手に渡す運用を推奨(画像貼りより誠実)
